name: Package and release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# the addon and publish it as a GitHub Release. Addon managers (WoWUp, CurseForge
# app, …) read these releases to install and auto-update OppositeQOL.
on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Clone project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Package and create release
        uses: BigWigsMods/packager@v2
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
